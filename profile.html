<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Profile Page</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100 bg-light">

    <!-- Header -->
    <div class="bg-dark text-white text-center p-4">
        <h1>👤 My Profile</h1>
    </div>

    <!-- Profile Section -->
    <div class="container mt-5 flex-grow-1">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow text-center p-4">

                    <!-- Profile Image -->
                    <img src="https://images.unsplash.com/photo-1511367461989-f85a21fda167?q=80&w=1331&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                        class="rounded-circle mx-auto mb-3" alt="Profile" id="profileAvatar"
                        style="width: 140px; height: 140px; object-fit: cover;">

                    <!-- Name -->
                    <h3 class="mb-1" id="profileName">Loading...</h3>
                    <p class="text-muted mb-3" id="profileTitle"></p>

                    <!-- Info -->
                    <ul class="list-group text-start mb-3">
                        <li class="list-group-item"><span class="me-2">📧</span><strong>Email:</strong> <span
                                class="text-break" id="profileEmail"></span></li>
                        <li class="list-group-item"><span class="me-2">📱</span><strong>Phone:</strong> <span
                                class="text-break" id="profilePhone"></span></li>
                        <li class="list-group-item"><span class="me-2">📍</span><strong>Location:</strong> <span
                                class="text-break" id="profileLocation"></span></li>
                    </ul>

                    <!-- Buttons -->
                    <button class="btn btn-primary w-100 mb-2" data-bs-toggle="modal"
                        data-bs-target="#editProfileModal">Edit Profile</button>
                    <button class="btn btn-outline-danger w-100">Logout</button>

                </div>

            </div>
        </div>
    </div>

    <!-- Edit Profile Modal -->
    <div class="modal fade" id="editProfileModal" tabindex="-1" aria-labelledby="editProfileModalLabel"
        aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editProfileModalLabel">Edit Profile</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <form id="editProfileForm">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="editName" class="form-label">Name</label>
                            <input type="text" class="form-control" id="editName" required>
                        </div>
                        <div class="mb-3">
                            <label for="editTitle" class="form-label">Title</label>
                            <input type="text" class="form-control" id="editTitle">
                        </div>
                        <div class="mb-3">
                            <label for="editEmail" class="form-label">Email</label>
                            <input type="email" class="form-control" id="editEmail">
                        </div>
                        <div class="mb-3">
                            <label for="editPhone" class="form-label">Phone</label>
                            <input type="text" class="form-control" id="editPhone">
                        </div>
                        <div class="mb-3">
                            <label for="editLocation" class="form-label">Location</label>
                            <input type="text" class="form-control" id="editLocation">
                        </div>
                        <div class="mb-0">
                            <label for="editAvatarUrl" class="form-label">Avatar URL</label>
                            <input type="url" class="form-control" id="editAvatarUrl">
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-auto">
        © 2026 My Profile
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function renderProfile(profile) {
            const avatar = document.getElementById("profileAvatar");
            avatar.src = profile.avatarUrl || avatar.src;

            document.getElementById("profileName").textContent = profile.name || "";
            document.getElementById("profileTitle").textContent = profile.title || "";
            document.getElementById("profileEmail").textContent = profile.email || "";
            document.getElementById("profilePhone").textContent = profile.phone || "";
            document.getElementById("profileLocation").textContent = profile.location || "";

            document.getElementById("editName").value = profile.name || "";
            document.getElementById("editTitle").value = profile.title || "";
            document.getElementById("editEmail").value = profile.email || "";
            document.getElementById("editPhone").value = profile.phone || "";
            document.getElementById("editLocation").value = profile.location || "";
            document.getElementById("editAvatarUrl").value = profile.avatarUrl || "";
        }

        async function loadProfile() {
            const response = await fetch("/api/profile");
            if (!response.ok) throw new Error("Failed to load profile");
            return response.json();
        }

        async function saveProfile(profile) {
            const response = await fetch("/api/profile", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(profile),
            });
            if (!response.ok) throw new Error("Failed to save profile");
            return response.json();
        }

        (async function init() {
            try {
                const profile = await loadProfile();
                renderProfile(profile);
            } catch (e) {
                document.getElementById("profileName").textContent = "Profile unavailable";
            }

            document.getElementById("editProfileForm").addEventListener("submit", async (event) => {
                event.preventDefault();

                const updated = {
                    name: document.getElementById("editName").value,
                    title: document.getElementById("editTitle").value,
                    email: document.getElementById("editEmail").value,
                    phone: document.getElementById("editPhone").value,
                    location: document.getElementById("editLocation").value,
                    avatarUrl: document.getElementById("editAvatarUrl").value,
                };

                try {
                    const saved = await saveProfile(updated);
                    renderProfile(saved);

                    const modalElement = document.getElementById("editProfileModal");
                    const modal = bootstrap.Modal.getInstance(modalElement) || new bootstrap.Modal(modalElement);
                    modal.hide();
                } catch (e) {
                    alert("Could not save profile. Please try again.");
                }
            });
        })();
    </script>

</body>

</html>
